name: terraform-prod

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  plan:
    if: github.event_name == 'pull_request' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: environments/prod/us-west-2
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -input=false -no-color 2>&1 | tee /tmp/tfplan.txt
        continue-on-error: true

      - name: Post plan to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN=$(cat /tmp/tfplan.txt)
          gh pr comment ${{ github.event.pull_request.number }} \
            --edit-last \
            --body "### Terraform Plan · prod · push \`${{ github.sha }}\`
          <details><summary>Click to expand</summary>

          \`\`\`
          ${PLAN}
          \`\`\`
          </details>" \
            2>/dev/null \
            || gh pr comment ${{ github.event.pull_request.number }} \
              --body "### Terraform Plan · prod · push \`${{ github.sha }}\`
          <details><summary>Click to expand</summary>

          \`\`\`
          ${PLAN}
          \`\`\`
          </details>"

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    if: github.event_name == 'push' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: environments/prod/us-west-2
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
