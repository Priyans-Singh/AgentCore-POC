name: terraform-plan

on:
  pull_request:
    branches:
      - preprod
      - main

jobs:
  plan-preprod:
    if: github.base_ref == 'preprod' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: pre-prod
    defaults:
      run:
        working-directory: environments/pre-prod/us-west-2
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

  plan-prod:
    if: github.base_ref == 'main' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod/us-west-2
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan
