name: terraform-apply

on:
  push:
    branches:
      - preprod
      - main

jobs:
  apply-preprod:
    if: github.ref_name == 'preprod' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: pre-prod
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: environments/pre-prod/us-west-2
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
      - name: Terraform validate
        run: terraform validate
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

  apply-prod:
    if: github.ref_name == 'main' && vars.ENABLE_TERRAFORM_APPLY == 'true'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: environments/prod/us-west-2
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_lambda_s3_bucket: ${{ vars.LAMBDA_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
      - name: Terraform validate
        run: terraform validate
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
